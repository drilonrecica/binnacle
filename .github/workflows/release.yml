name: release
on:
  pull_request:
  push:
    tags: ['v*']

permissions:
  contents: read
  packages: write
  attestations: write
  id-token: write

jobs:
  validate:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - name: Dry-run version/channel validation
        run: |
          set -euo pipefail
          scripts/validate-version.sh v0.1.0-alpha.1 | grep 'channel=edge'
          scripts/validate-version.sh v0.1.0-beta.1 | grep 'channel=beta'
          scripts/validate-version.sh v0.1.0 | grep 'channel=stable'
          ! scripts/validate-version.sh v0.1.0-alpha.1 | grep 'channel=stable'
          ! scripts/validate-version.sh invalid-tag

  publish:
    needs: validate
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - name: Validate version
        id: version
        run: scripts/validate-version.sh "${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
      - uses: docker/setup-qemu-action@291b0962fb745b417273906199842ada179583da
      - uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5b23242
      - uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        id: build
        uses: docker/build-push-action@471d1dc4e07e5cdedd4c2171150001c434f63b9e
        with:
          context: .
          file: packaging/docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/talos:${{ steps.version.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/talos:${{ steps.version.outputs.channel }}
      - uses: actions/attest-build-provenance@v1
        with:
          subject-name: ghcr.io/${{ github.repository_owner }}/talos
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

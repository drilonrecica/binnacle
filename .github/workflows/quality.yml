name: quality
on: [pull_request, push]
permissions: { contents: read }
jobs:
  go:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: actions/setup-go@v5
        with: { go-version: '1.26.x', check-latest: true }
      - uses: actions/setup-node@v4
        with: { node-version: 24 }
      - run: npm install -g pnpm@11.12.0
      - run: echo "STORE_PATH=$(pnpm store path --silent)" >> "$GITHUB_ENV"
      - uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-
      - run: pnpm --dir web install --frozen-lockfile
      - run: pnpm --dir web build
      - run: gofmt -l cmd internal | (! grep .)
      - run: go vet ./...
      - run: go test ./...
  web:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: actions/setup-node@v4
        with: { node-version: 24 }
      - run: npm install -g pnpm@11.12.0
      - run: echo "STORE_PATH=$(pnpm store path --silent)" >> "$GITHUB_ENV"
      - uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-
      - run: pnpm --dir web install --frozen-lockfile
      - run: pnpm --dir web format && pnpm --dir web check && pnpm --dir web lint && pnpm --dir web test:run
  container:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - run: docker build -f packaging/docker/Dockerfile -t talos:ci .
      - run: docker run --rm --entrypoint /usr/local/bin/talos talos:ci --help || test $$? -eq 1
      - run: |
          export DOCKER_GID=$(getent group docker | cut -d: -f3)
          TALOS_SETUP_TOKEN=dummy docker compose -f packaging/docker/docker-compose.yml config
      - run: scripts/validate-coolify-template.sh

# Canonical Docker Compose deployment for TALOS.
# Provide a secure setup token before first start:
#   export TALOS_SETUP_TOKEN="$(openssl rand -hex 32)"
# Then run: docker compose -f packaging/docker/docker-compose.yml up -d

services:
  talos:
    image: ghcr.io/drilonrecica/talos:stable
    container_name: talos
    restart: unless-stopped
    read_only: true
    privileged: false
    user: "talos:${DOCKER_GID:?DOCKER_GID is required; run export DOCKER_GID=$(getent group docker | cut -d: -f3)}"
    security_opt:
      - no-new-privileges:true
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      TALOS_DATA_DIR: /var/lib/talos
      TALOS_HOST_PROC: /host/proc
      TALOS_HOST_SYS: /host/sys
      TALOS_SETUP_TOKEN: ${TALOS_SETUP_TOKEN:?TALOS_SETUP_TOKEN is required for the first installation}
    volumes:
      - talos-data:/var/lib/talos
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /etc/os-release:/host/etc/os-release:ro
      - /var/run/docker.sock:/var/run/docker.sock
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M
    healthcheck:
      test: ["CMD", "/usr/local/bin/talos", "--healthcheck"]
      interval: 30s
      timeout: 5s
      start_period: 5s
      retries: 3

volumes:
  talos-data:
